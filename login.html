<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>51X SUMMER — Login</title>
<link rel="stylesheet" href="./css/login.css">
</head>
<body>

<div class="glow-orb top"></div>
<div class="glow-orb bottom"></div>

<div class="login-wrap">

  <div class="brand">
    <div class="brand-season">Studio Access</div>
    <div class="brand-title">51X</div>
    <div class="brand-sub">Summer Studio</div>
  </div>

  <div class="card" id="login-card">
    <div class="card-label">Sign in to continue</div>

    <div class="field">
      <label class="field-label" for="inp-id">User ID</label>
      <input class="field-input" id="inp-id" type="text"
             placeholder="enter your id" autocomplete="off" spellcheck="false">
    </div>

    <div class="field" style="margin-bottom:0">
      <label class="field-label" for="inp-pw">Password</label>
      <input class="field-input" id="inp-pw" type="password"
             placeholder="enter your password">
    </div>

    <div class="error-msg" id="error-msg">
      ⚠ 아이디 또는 비밀번호가 올바르지 않습니다.
    </div>

    <button class="login-btn" id="login-btn" onclick="doLogin()">Login</button>
  </div>

  <div class="footer-meta">T51 · 51X Summer Studio &nbsp;·&nbsp; 2025</div>

</div>

<script>
  // ── 인증 정보 ──────────────────────────────────────
  // localStorage 사용: file:// 프로토콜에서도 파일 간 유지됨
  const CREDENTIALS = [
    { id: 'shlee', pw: '51' },
    { id: 'yeyoo', pw: '51' },
    { id: 'jychoi', pw: '51' },

    { id: 'jycho', pw: '51' },
    { id: 'jjwook', pw: '51' },
    { id: 'eun', pw: '51' },
    { id: 'jyjo', pw: '51' },
    { id: 'sjkim1', pw: '51' },
    { id: 'syjung', pw: '51' },
    { id: 'hywon', pw: '51' },
    { id: 'hjseo1', pw: '51' }
    
    // 계정 추가 시 여기에 { id:'...', pw:'...' } 형태로 추가
  ];
  const SESSION_KEY = '51x_session_user';

  // 이미 로그인 상태면 앱으로 바로 이동
  if (localStorage.getItem(SESSION_KEY)) {
    window.location.href = './html/index.html';
  }

  // Enter 키 지원
  document.getElementById('inp-id').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('inp-pw').focus();
  });
  document.getElementById('inp-pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function doLogin() {
    const id  = document.getElementById('inp-id').value.trim();
    const pw  = document.getElementById('inp-pw').value;
    const card = document.getElementById('login-card');
    const btn  = document.getElementById('login-btn');
    const err  = document.getElementById('error-msg');

    const match = CREDENTIALS.find(c => c.id === id && c.pw === pw);

    if (match) {
      btn.textContent = '✓  Entering...';
      btn.classList.add('loading');
      // localStorage에 세션 저장 → file:// 파일 간 이동에도 유지
      localStorage.setItem(SESSION_KEY, id);
      setTimeout(() => {
        window.location.href = './html/index.html';
      }, 600);
    } else {
      err.classList.add('show');
      card.classList.remove('shake');
      void card.offsetWidth;
      card.classList.add('shake');
      document.getElementById('inp-pw').value = '';
      document.getElementById('inp-pw').focus();
    }
  }
</script>
</body>
</html>
